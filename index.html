<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Хехехе</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container" id="questionPage">
        <h1 class="question">ТЫ МЕНЯ ЛЮБИШЬ?</h1>
        
        <div class="buttons">
            <button class="btn btn-yes" id="yesBtn">ДА</button>
            <button class="btn btn-no" id="noBtn">НЕТ</button>
        </div>
        
        <div class="cat-container">
            <img src="tenor.gif" alt="Cute Cat" class="cat" id="cat">
        </div>
    </div>

    <div class="container success-page" id="successPage" style="display: none;">
        <h1 class="success-title">Я ЗНАЛ, ЧТО ТЫ СКАЖЕШЬ ДА!</h1>
        <h2 class="subtitle">СЧАСТЛИВЫХ 100 ДНЕЙ, МОЯ МИЛАШКА!!!</h2>
        <button class="message-btn"><a href="text.html">Сообщение</a></button>
        <div class="couple-container">
            <img src="smoochie-smooches.gif" alt="Couple" class="couple">
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
